# Railway Configuration for Med-System
# Simple single-service configuration
# https://docs.railway.app/reference/config-as-code

[build]
builder = "dockerfile"
dockerfile = "Dockerfile"
context = "."

[deploy]
startCommand = "node /app/dist/server.js"
restartPolicyMaxRetries = 5

[environments.production]
PORT = "3000"
NODE_ENV = "production"
LOG_LEVEL = "info"
QUEUE_CONCURRENCY = "5"
QUEUE_MAX_RETRIES = "3"
QUEUE_RETRY_DELAY_MS = "5000"
JWT_EXPIRES_IN = "24h"
APP_NAME = "Med-System"
