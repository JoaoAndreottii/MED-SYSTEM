version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: med-system-postgres
    environment:
      POSTGRES_USER: medsystem
      POSTGRES_PASSWORD: medsystem123
      POSTGRES_DB: medsystem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: med-system-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: med-system-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://medsystem:medsystem123@postgres:5432/medsystem
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-secret-key-here
      JWT_EXPIRES_IN: 24h
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: med-system-web
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
