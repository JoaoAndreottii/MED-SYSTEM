<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Med-System - Medical Clinic Automation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-blue-600">Med-System</h1>
      <div class="space-x-4">
        <a href="#" class="text-gray-600 hover:text-gray-900">Login</a>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-12">
    <div class="text-center mb-12">
      <h1 class="text-4xl font-bold text-gray-900 mb-4">Medical Clinic Automation</h1>
      <p class="text-xl text-gray-600">Complete solution for modern healthcare management</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-lg font-semibold mb-2">📅 Appointments</h3>
        <p class="text-gray-600">Schedule and manage patient appointments</p>
      </div>
      <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-lg font-semibold mb-2">💳 Billing</h3>
        <p class="text-gray-600">Invoice management and payment tracking</p>
      </div>
      <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-lg font-semibold mb-2">📊 Analytics</h3>
        <p class="text-gray-600">Real-time clinic performance metrics</p>
      </div>
    </div>
  </main>

  <footer class="bg-gray-800 text-white py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p>© 2026 Med-System. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
